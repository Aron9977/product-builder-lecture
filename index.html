<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini for Sangsun</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <button class="theme-toggle" id="theme-toggle" aria-label="테마 변경">🌓</button>
        <div class="header">
            <span class="badge">Special Edition for Sangsun</span>
            <h1>이상선 님을 위한 응원</h1>
            <p class="subtitle">캐세이퍼시픽의 자부심, 상선 님의 빛나는 30대와 타지에서의 도전을 Gemini가 응원합니다.</p>
        </div>
        
        <div class="action-area">
            <button id="generate-btn" class="main-btn">✨ 오늘의 응원 받기</button>
        </div>

        <div id="message-display" class="message-display hidden">
            <div id="loading-spinner" class="spinner hidden"></div>
            <div id="message-content"></div>
        </div>

        <div id="history-container" class="history-container">
            <!-- 이전 메시지들이 여기에 나타납니다 -->
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
