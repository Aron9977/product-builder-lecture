<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini 오늘의 좋은 말</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <button class="theme-toggle" id="theme-toggle" aria-label="테마 변경">🌓</button>
        <div class="header">
            <span class="badge">Powered by Gemini 3.1</span>
            <h1>오늘의 좋은 말</h1>
            <p class="subtitle">AI가 전하는 긍정적인 한마디로 당신의 하루를 밝혀보세요.</p>
        </div>
        
        <div class="action-area">
            <button id="generate-btn" class="main-btn">✨ 좋은 말 받기</button>
        </div>

        <div id="message-display" class="message-display hidden">
            <div id="loading-spinner" class="spinner hidden"></div>
            <div id="message-content"></div>
        </div>

        <div id="history-container" class="history-container">
            <!-- 이전 메시지들이 여기에 나타납니다 -->
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
